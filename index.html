<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oder24Hz</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
  color:#e5e5e5;
  overflow-x:hidden;
}

/* 🔥 жирный текст */
h1{
  font-weight:900;
  font-size:clamp(40px,6vw,64px);
}

/* 🌈 переливание текста */
.gradient-text{
  background:linear-gradient(90deg,#000,#666,#fff,#666,#000);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}
@keyframes shine{
  0%{background-position:0%}
  100%{background-position:300%}
}

h2{
  font-weight:700;
}
p,li{
  font-weight:500;
  color:#aaa;
}

/* карточки */
.card{
  background:#111;
  border:1px solid #222;
  border-radius:14px;
  padding:18px;
  max-width:500px;
  margin:auto;
  transition:.3s;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 25px 60px rgba(0,0,0,.8);
}

/* кнопка */
.btn{
  position:relative;
  overflow:hidden;
  border-radius:999px;
  padding:12px 28px;
  background:#fff;
  color:#000;
  font-weight:700;
  transition:.2s;
}
.btn:hover{
  transform:scale(1.03);
}

/* ripple эффект */
.btn::after{
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(0,0,0,0.2);
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.btn:active::after{
  width:300px;
  height:300px;
  transition:0.4s;
}

/* reveal */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:all .7s ease;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}

/* меню */
#buyMenu{
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%);
  margin-top:10px;
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:10px;
  width:220px;
  z-index:50;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header class="text-center py-24 reveal">
  <h1 class="gradient-text">Oder24Hz</h1>
  <p>Оптимизация без лагов и мусора</p>
</header>

<section class="space-y-6 px-4 reveal">

  <div class="card text-center">
    <h2 class="mb-3">Что я предлагаю</h2>
    <ul class="space-y-2">
      <li>• Оптимизация Windows</li>
      <li>• Ускорение Bluestacks</li>
      <li>• Настройка FPS</li>
    </ul>
  </div>

  <div class="card text-center relative">
    <button id="buyBtn" class="btn">Купить оптимизацию</button>

    <div id="buyMenu" class="hidden">
      <a href="https://t.me/OderOptimization" target="_blank" class="block py-2">Telegram</a>
      <a href="https://www.donationalerts.com/r/oder24hz" target="_blank" class="block py-2">DonationAlerts</a>
      <a href="https://new.donatepay.ru/@1292052" target="_blank" class="block py-2">DonatePay</a>
    </div>
  </div>

</section>

<section class="py-16 reveal">
  <h2 class="text-center mb-6">Цены</h2>

  <div class="space-y-3 max-w-md mx-auto">
    <div class="card flex justify-between"><span>Windows</span><span>150₽</span></div>
    <div class="card flex justify-between"><span>Bluestacks</span><span>250₽</span></div>
    <div class="card flex justify-between"><span>Настройка</span><span>50₽</span></div>
  </div>
</section>

<script>
/* particles */
const c=document.getElementById("particles"),x=c.getContext("2d");
function r(){c.width=innerWidth;c.height=innerHeight}r();
addEventListener("resize",r);

let p=[...Array(100)].map(()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  dx:(Math.random()-.5)*0.5,
  dy:(Math.random()-.5)*0.5
}));

function draw(){
  x.clearRect(0,0,c.width,c.height);

  for(let i=0;i<p.length;i++){
    for(let j=i+1;j<p.length;j++){
      let dx=p[i].x-p[j].x;
      let dy=p[i].y-p[j].y;
      let d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){
        x.strokeStyle=`rgba(255,255,255,${1-d/130})`;
        x.beginPath();
        x.moveTo(p[i].x,p[i].y);
        x.lineTo(p[j].x,p[j].y);
        x.stroke();
      }
    }
  }

  p.forEach(e=>{
    e.x+=e.dx;e.y+=e.dy;
    if(e.x<0||e.x>c.width)e.dx*=-1;
    if(e.y<0||e.y>c.height)e.dy*=-1;

    x.fillStyle="white";
    x.beginPath();
    x.arc(e.x,e.y,1.5,0,Math.PI*2);
    x.fill();
  });

  requestAnimationFrame(draw);
}
draw();

/* reveal */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("active");
  });
});
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

/* меню фикс */
const btn=document.getElementById("buyBtn");
const menu=document.getElementById("buyMenu");

btn.onclick=()=>{
  menu.classList.toggle("hidden");
};
</script>

</body>
</html>
