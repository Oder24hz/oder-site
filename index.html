<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Oder24hz</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

.center {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 60px;
}

.title {
  font-size: 70px;
  font-weight: 900;
  background: linear-gradient(90deg, white, gray, black);
  -webkit-background-clip: text;
  color: transparent;
}

.glass {
  margin: 40px auto;
  max-width: 600px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

button, a {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 12px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

button:hover, a:hover {
  transform: scale(1.05);
}

.links a {
  background: rgba(255,255,255,0.1);
  color: white;
  margin: 5px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="center">
  <div class="title">Oder24hz</div>

  <div class="glass">
    <h2>Что я предлагаю</h2>
    <p>• Оптимизация Windows — ускорение, удаление мусора</p>
    <p>• Bluestacks — FPS, плавность, сенса</p>
    <p>• Быстрая настройка Bluestacks</p>
  </div>

  <a href="https://t.me/OderOptimization">Купить оптимизацию</a>

  <div class="links">
    <a href="https://t.me/OderOptimization">Telegram</a>
    <a href="https://www.donationalerts.com/r/oder24hz">DonateAlerts</a>
    <a href="https://new.donatepay.ru/@1292052">DonatePay</a>
  </div>

  <div class="glass">
    <p>Windows — 150p</p>
    <p>Bluestacks — 250p</p>
    <p>Настройка — 50p</p>
    <p>Вирусы — 100p</p>
  </div>

  <a href="https://t.me/Oder_optim">Отзывы Telegram</a>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let p = Array.from({length: 60}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  vx:(Math.random()-0.5)*0.6,
  vy:(Math.random()-0.5)*0.6
}));

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<p.length;i++){
    let a=p[i];
    a.x+=a.vx;
    a.y+=a.vy;

    if(a.x<0||a.x>canvas.width)a.vx*=-1;
    if(a.y<0||a.y>canvas.height)a.vy*=-1;

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(a.x,a.y,2,0,Math.PI*2);
    ctx.fill();

    for(let j=i+1;j<p.length;j++){
      let b=p[j];
      let d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){
        ctx.strokeStyle=`rgba(255,255,255,${1-d/120})`;
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
