<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oder24Hz — Оптимизация</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Rubik', sans-serif;
  background: radial-gradient(circle at top, #0a0a0a, #050505);
  color: white;
  overflow-x: hidden;
}

/* soft glow background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.05), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.03), transparent 50%);
  z-index:-2;
}

/* particles */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

/* IOS 26 glass */
.glass{
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 18px;
}

/* hover glass */
.glass-hover{
  transition:.25s;
}
.glass-hover:hover{
  transform: translateY(-3px);
  background: rgba(255,255,255,0.09);
}

/* button */
.btn{
  border:1px solid rgba(255,255,255,.25);
  border-radius:14px;
  padding:12px 22px;
  transition:.25s;
  cursor:pointer;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}
.btn:hover{
  background:white;
  color:black;
  transform:scale(1.05);
}

/* glow title */
.glow{
  text-shadow:
    0 0 10px rgba(255,255,255,.35),
    0 0 25px rgba(255,255,255,.15);
}

/* fade text */
.fade-word{
  display:inline-block;
  transition:opacity .4s, transform .4s;
}
.fade-out{
  opacity:0;
  transform:translateY(6px);
}

/* dropdown FIX (главная проблема) */
.dropdown{
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  margin-top: 12px;
  width: 260px;
  z-index: 99999;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- HERO -->
<header class="text-center py-20 px-4">
  <h1 class="text-5xl sm:text-6xl font-bold mb-4 glow">Oder24Hz</h1>

  <p class="text-gray-300 text-lg">
    <span id="word1" class="fade-word">Лучшая</span>
    оптимизация для твоего
    <span id="word2" class="fade-word">компьютера</span>
  </p>
</header>

<!-- CONTENT -->
<section class="max-w-3xl mx-auto px-4 space-y-6">

  <div class="glass p-6 text-center">
    <h2 class="text-xl font-semibold mb-3">Что я предлагаю</h2>
    <ul class="space-y-2 text-gray-300 text-sm">
      <li>Оптимизация Windows</li>
      <li>Bluestacks FPS / плавность</li>
      <li>Настройка системы</li>
    </ul>
  </div>

  <!-- BUY -->
  <div class="glass p-6 text-center relative overflow-visible">

    <button id="buyBtn" class="btn font-semibold relative z-50">
      Купить оптимизацию
    </button>

    <!-- dropdown FIXED (не ломает кнопку и всегда сверху) -->
    <div id="buyMenu" class="dropdown glass p-3 space-y-2 opacity-0 scale-95 pointer-events-none transition-all duration-200">

      <a href="https://t.me/OderOptimization"
         class="block text-center py-2 rounded-lg bg-blue-600 hover:bg-blue-700">
        Telegram
      </a>

      <a href="https://www.donationalerts.com/r/oder24hz"
         class="block text-center py-2 rounded-lg bg-green-600 hover:bg-green-700">
        DonationAlerts
      </a>

      <a href="https://new.donatepay.ru/@1292052"
         class="block text-center py-2 rounded-lg bg-purple-600 hover:bg-purple-700">
        DonatePay
      </a>
    </div>
  </div>

</section>

<!-- PRICES -->
<section class="max-w-3xl mx-auto px-4 py-10">
  <div class="glass p-6">
    <h2 class="text-center text-lg mb-4">Цены</h2>

    <div class="space-y-2 text-sm text-gray-300">
      <div class="flex justify-between">Windows оптимизация <span>150₽</span></div>
      <div class="flex justify-between">Bluestacks <span>250₽</span></div>
      <div class="flex justify-between">Настройка <span>50₽</span></div>
      <div class="flex justify-between">Вирусы <span>100₽</span></div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="text-center text-gray-500 text-xs py-8">
  © 2026 Oder24Hz
</footer>

<script>
/* PARTICLES + CONNECTIONS */
const c=document.getElementById("particles");
const x=c.getContext("2d");

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let p=Array.from({length:90},()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  dx:(Math.random()-.5)*0.4,
  dy:(Math.random()-.5)*0.4,
  s:Math.random()*1.5+0.5
}));

function drawLines(){
  for(let i=0;i<p.length;i++){
    for(let j=i+1;j<p.length;j++){
      let a=p[i], b=p[j];
      let d=Math.hypot(a.x-b.x,a.y-b.y);

      if(d<120){
        x.strokeStyle=`rgba(255,255,255,${1-d/120})`;
        x.lineWidth=1;
        x.beginPath();
        x.moveTo(a.x,a.y);
        x.lineTo(b.x,b.y);
        x.stroke();
      }
    }
  }
}

(function anim(){
  x.clearRect(0,0,c.width,c.height);

  drawLines();

  p.forEach(e=>{
    e.x+=e.dx;
    e.y+=e.dy;

    if(e.x<0)e.x=c.width;
    if(e.x>c.width)e.x=0;
    if(e.y<0)e.y=c.height;
    if(e.y>c.height)e.y=0;

    x.fillStyle="rgba(255,255,255,.5)";
    x.beginPath();
    x.arc(e.x,e.y,e.s,0,Math.PI*2);
    x.fill();
  });

  requestAnimationFrame(anim);
})();

/* dropdown safe toggle */
const buyBtn=document.getElementById("buyBtn");
const buyMenu=document.getElementById("buyMenu");

buyBtn.addEventListener("click",()=>{
  const open = buyMenu.classList.contains("opacity-100");

  buyMenu.classList.toggle("opacity-100", !open);
  buyMenu.classList.toggle("opacity-0", open);
  buyMenu.classList.toggle("scale-100", !open);
  buyMenu.classList.toggle("scale-95", open);
  buyMenu.classList.toggle("pointer-events-none", open);
});

/* text animation */
const w1=["Лучшая","Мощная"];
const w2=["компьютера","системы"];
let i=0;

setInterval(()=>{
  word1.classList.add("fade-out");
  setTimeout(()=>{
    i=(i+1)%w1.length;
    word1.textContent=w1[i];
    word1.classList.remove("fade-out");
  },300);
},3000);

setInterval(()=>{
  word2.classList.add("fade-out");
  setTimeout(()=>{
    word2.textContent=w2[i];
    word2.classList.remove("fade-out");
  },300);
},3000);

</script>

</body>
</html>
