<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oder24Hz — Оптимизация</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Rubik', sans-serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* canvas */
canvas{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 18px;
}

/* hover */
.glass-hover{
  transition:.25s;
}
.glass-hover:hover{
  transform: translateY(-4px);
  background: rgba(255,255,255,0.09);
}

/* button */
.btn{
  border:1px solid rgba(255,255,255,.5);
  border-radius:14px;
  padding:12px 22px;
  transition:.3s;
  cursor:pointer;
}
.btn:hover{
  background:white;
  color:black;
  transform:scale(1.05);
}

/* glow */
@keyframes glowPulse {
  0% { text-shadow:0 0 6px rgba(255,255,255,.2); }
  50% { text-shadow:0 0 25px rgba(255,255,255,.8); }
  100% { text-shadow:0 0 6px rgba(255,255,255,.2); }
}
.glow-title{
  animation: glowPulse 2.5s infinite ease-in-out;
}

/* text */
.fade-word{
  transition:.4s;
  display:inline-block;
}
.fade-out{
  opacity:0;
  transform:translateY(6px);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- HEADER -->
<header class="text-center py-20 px-4">
  <h1 class="text-5xl font-bold glow-title mb-4">Oder24Hz</h1>

  <p class="text-gray-300">
    <span id="word1">Лучшая</span>
    оптимизация для твоего
    <span id="word2">компьютера</span>
  </p>
</header>

<!-- WHAT I OFFER -->
<section class="px-4 mb-10">
  <div class="glass glass-hover p-5 max-w-md mx-auto text-center">
    <h2 class="text-2xl font-semibold mb-4">Что я предлагаю</h2>
    <ul class="space-y-2 text-gray-200 text-sm">
      <li>• Оптимизация Windows — ускорение, удаление мусора</li>
      <li>• Bluestacks — FPS, плавность, сенса</li>
      <li>• Быстрая настройка Bluestacks</li>
    </ul>
  </div>
</section>

<!-- BUY -->
<section class="px-4 mb-12">
  <div class="glass glass-hover p-5 max-w-md mx-auto text-center relative">

    <button id="buyBtn" class="btn font-semibold">
      Купить оптимизацию
    </button>

    <div id="buyMenu"
         class="absolute left-1/2 -translate-x-1/2 mt-4 w-56 glass p-3 text-sm space-y-2 opacity-0 scale-95 pointer-events-none transition-all duration-300">

      <a href="https://t.me/OderOptimization" class="block py-2 bg-blue-600 rounded-lg">Telegram</a>
      <a href="https://www.donationalerts.com/r/oder24hz" class="block py-2 bg-green-600 rounded-lg">DonationAlerts</a>
      <a href="https://new.donatepay.ru/@1292052" class="block py-2 bg-purple-600 rounded-lg">DonatePay</a>

    </div>
  </div>
</section>

<script>
/* particles */
const c=document.getElementById("particles"),x=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

let p=[...Array(70)].map(()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  s:Math.random()*2,
  dx:(Math.random()-.5)*0.6,
  dy:(Math.random()-.5)*0.6
}));

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function loop(){
  x.clearRect(0,0,c.width,c.height);

  for(let i=0;i<p.length;i++){
    for(let j=i+1;j<p.length;j++){
      let d=dist(p[i],p[j]);
      if(d<130){
        x.strokeStyle=`rgba(255,255,255,${1-d/130})`;
        x.beginPath();
        x.moveTo(p[i].x,p[i].y);
        x.lineTo(p[j].x,p[j].y);
        x.stroke();
      }
    }
  }

  p.forEach(e=>{
    e.x+=e.dx;
    e.y+=e.dy;

    if(e.x<0)e.x=c.width;
    if(e.x>c.width)e.x=0;
    if(e.y<0)e.y=c.height;
    if(e.y>c.height)e.y=0;

    x.fillStyle="rgba(255,255,255,.5)";
    x.beginPath();
    x.arc(e.x,e.y,e.s,0,Math.PI*2);
    x.fill();
  });

  requestAnimationFrame(loop);
}
loop();

/* menu */
buyBtn.onclick=()=>{
  buyMenu.classList.toggle("opacity-100");
  buyMenu.classList.toggle("scale-100");
  buyMenu.classList.toggle("opacity-0");
  buyMenu.classList.toggle("scale-95");
  buyMenu.classList.toggle("pointer-events-none");
};

/* text */
const w1=["Лучшая","Прекрасная"];
const w2=["компьютера","ноутбука"];
let i=0;

setInterval(()=>{
  word1.classList.add("fade-out");
  setTimeout(()=>{
    i=(i+1)%w1.length;
    word1.textContent=w1[i];
    word1.classList.remove("fade-out");
  },300);
},3000);

setInterval(()=>{
  word2.classList.add("fade-out");
  setTimeout(()=>{
    word2.textContent=w2[i];
    word2.classList.remove("fade-out");
  },300);
},3200);
</script>

</body>
</html>
