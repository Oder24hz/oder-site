<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oder24Hz — Оптимизация</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Rubik', sans-serif;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

h1,h2,p,span,li {
  text-shadow: 0 0 8px rgba(255,255,255,0.12);
}

/* background glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.06), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,.04), transparent 40%);
  z-index:-2;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

/* cards */
.card{
  position: relative;
  z-index: 1;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:1.2rem;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(255,255,255,0.05);
  padding:20px;
}

.card-hover{
  transition:.4s;
}
.card-hover:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow: 0 0 40px rgba(255,255,255,0.12);
}

/* button */
.btn{
  border:1px solid rgba(255,255,255,0.6);
  border-radius:1rem;
  padding:12px 24px;
  transition:.3s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  z-index:2;
}

.btn:hover{
  background:white;
  color:black;
  transform:scale(1.05);
}

/* BUY MENU FIX */
#buyMenu{
  position:absolute;
  left:50%;
  transform:translateX(-50%) scale(0.95);
  margin-top:12px;

  z-index:9999;

  opacity:0;
  pointer-events:none;
  transition:.25s;
}

#buyMenu.show{
  opacity:1;
  transform:translateX(-50%) scale(1);
  pointer-events:auto;
}

/* PAY BUTTONS */
.pay-btn{
  display:block;
  width:100%;
  text-align:center;
  padding:10px;
  border-radius:12px;
  font-weight:600;
  color:black;
  position:relative;
  overflow:hidden;
}

/* shimmer */
.pay-btn::after{
  content:"";
  position:absolute;
  inset:-200%;
  animation: shimmer 4s linear infinite;
  opacity:.6;
}

@keyframes shimmer{
  0%{transform:translateX(-30%);}
  100%{transform:translateX(30%);}
}

/* TELEGRAM */
.tg{
  background:linear-gradient(120deg,#fff,#3aa6ff,#fff);
}
.tg::after{
  background:linear-gradient(120deg,#fff,#3aa6ff,#fff);
}

/* DONATIONALERTS */
.da{
  background:linear-gradient(120deg,#fff,#ff8c00,#fff);
}
.da::after{
  background:linear-gradient(120deg,#fff,#ff8c00,#fff);
}

/* DONATEPAY */
.dp{
  background:linear-gradient(120deg,#fff,#a855f7,#fff);
}
.dp::after{
  background:linear-gradient(120deg,#fff,#a855f7,#fff);
}

/* reveal */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:.8s;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}

.fade-word{
  display:inline-block;
  transition:.4s;
}
.fade-out{
  opacity:0;
  transform:translateY(8px);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header class="text-center py-16 px-4 reveal">
  <h1 class="text-5xl font-bold mb-4">Oder24Hz</h1>
  <p class="text-gray-300 text-lg">
    <span id="word1" class="fade-word">Лучшая</span>
    оптимизация для твоего
    <span id="word2" class="fade-word">компьютера</span>
  </p>
</header>

<section class="max-w-xl mx-auto px-4 space-y-4 reveal">

  <div class="card text-center">
    <h2 class="text-2xl font-semibold mb-4">Что я предлагаю</h2>
    <ul class="space-y-2 text-gray-200">
      <li>• Оптимизация Windows</li>
      <li>• Bluestacks FPS boost</li>
      <li>• Быстрая настройка</li>
    </ul>
  </div>

  <div class="card text-center relative">

    <button id="buyBtn" class="btn font-semibold">
      Купить оптимизацию
    </button>

    <div id="buyMenu" class="bg-white/10 backdrop-blur-md border border-white/10 rounded-xl p-4 text-sm space-y-2">

      <a href="https://t.me/OderOptimization" target="_blank" class="pay-btn tg">Telegram</a>
      <a href="https://www.donationalerts.com/r/oder24hz" target="_blank" class="pay-btn da">DonationAlerts</a>
      <a href="https://new.donatepay.ru/@1292052" target="_blank" class="pay-btn dp">DonatePay</a>

    </div>

  </div>
</section>

<section class="text-center py-8 reveal">
  <a href="https://t.me/Oder_optim" class="btn inline-block font-semibold">
    Отзывы Telegram
  </a>
</section>

<footer class="text-center text-gray-500 text-sm py-6">
  © 2026 Oder24Hz
</footer>

<script>
// particles
const c=document.getElementById("particles"),x=c.getContext("2d");
function r(){c.width=innerWidth;c.height=innerHeight}r();
addEventListener("resize",r);

let p=[...Array(60)].map(()=>({
x:Math.random()*c.width,
y:Math.random()*c.height,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
}));

function draw(){
x.clearRect(0,0,c.width,c.height);
p.forEach(e=>{
e.x+=e.dx;e.y+=e.dy;
if(e.x<0||e.x>c.width)e.dx*=-1;
if(e.y<0||e.y>c.height)e.dy*=-1;

x.fillStyle="white";
x.beginPath();
x.arc(e.x,e.y,1.3,0,Math.PI*2);
x.fill();
});
requestAnimationFrame(draw);
}
draw();

// reveal
const obs=new IntersectionObserver(e=>{
e.forEach(v=>{if(v.isIntersecting)v.target.classList.add("active")});
});
document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));

// menu
const btn=document.getElementById("buyBtn");
const menu=document.getElementById("buyMenu");

btn.onclick=()=>menu.classList.toggle("show");

// text swap
const w1=["Лучшая","Крутая"];
const w2=["компьютера","ноутбука"];
let i=0;

setInterval(()=>{
word1.classList.add("fade-out");
setTimeout(()=>{
i=(i+1)%w1.length;
word1.textContent=w1[i];
word1.classList.remove("fade-out");
},300);
},3000);

setInterval(()=>{
word2.classList.add("fade-out");
setTimeout(()=>{
word2.textContent=w2[i];
word2.classList.remove("fade-out");
},300);
},3000);

</script>

</body>
</html>
